name: Daily Scrape

on:
  schedule:
    - cron: '0 */6 * * *' # Berjalan otomatis setiap 6 jam
  workflow_dispatch: # Memungkinkan dijalankan secara manual

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Memastikan Action memiliki izin untuk menulis ke repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Mengambil seluruh history agar rebase lancar

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Commit and push if changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add latest_report.md
          # Cek apakah ada perubahan sebelum commit
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update latest report: $(date)"
            # Gunakan pull --rebase untuk sinkronisasi sebelum push
            git pull --rebase origin main
            git push origin main
          fi
